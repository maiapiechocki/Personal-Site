<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="sage.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden | Maia Piechocki</title>
    <style>
        body {
            background-color: #fffdf7;
            margin: 0;
            padding: 100px 20px 20px 80px;
            font-family: sans-serif;
        }

        .folder-grid {
            display: flex;
            flex-direction: row;
            gap: 40px;
            align-items: flex-start;
        }

        .folder-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: fit-content;
        }

        .folder-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: black;
            font-size: 14px;
            width: 70px;
            transition: opacity 0.2s;
        }

        .folder-link:hover {
            opacity: 0.7;
        }

        .folder-icon {
            width: 60px;
            height: auto;
            border-radius: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            display: block;
            line-height: 0;
        }

        .folder-label {
            text-align: center;
            word-wrap: break-word;
        }

        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            width: 60px;
            height: 60px;
        }

        .close-btn::before,
        .close-btn::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: black;
            transform-origin: center;
            position: absolute;
            top: 50%;
        }
        .close-btn::before { transform: rotate(45deg); }
        .close-btn::after  { transform: rotate(-45deg); }

        .garden-gif {
            position: fixed;
            bottom: -55px;
            right: 40px;
            z-index: 1000;
            pointer-events: none;
        }

        .garden-gif img {
            width: 500px;
        }

        @media (max-width: 768px) {
            body {
                padding: 60px 20px 20px 24px;
            }

            .folder-grid {
                gap: 24px;
                flex-wrap: wrap;
            }

            .folder-link {
                width: 60px;
                font-size: 12px;
            }

            .folder-icon {
                width: 50px;
            }

            .close-btn {
                width: 40px;
                height: 40px;
                top: 16px;
                right: 16px;
            }

            .close-btn::before,
            .close-btn::after {
                width: 40px;
            }

            .garden-gif img {
                width: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="folder-grid">

        <div class="folder-column">
            <a href="photos.html" class="folder-link">
                <img src="folder.png" alt="folder" class="folder-icon">
                <span class="folder-label">photos</span>
            </a>
            <a href="books.html" class="folder-link">
                <img src="folder.png" alt="folder" class="folder-icon">
                <span class="folder-label">books</span>
            </a>
            <a href="art.html" class="folder-link">
                <img src="folder.png" alt="folder" class="folder-icon">
                <span class="folder-label">art</span>
            </a>
            <a href="writing.html" class="folder-link">
                <img src="folder.png" alt="folder" class="folder-icon">
                <span class="folder-label">writing</span>
            </a>
        </div>

        <div class="folder-column">
            <a href="recipes.html" class="folder-link">
                <img src="folder.png" alt="folder" class="folder-icon">
                <span class="folder-label">recipes</span>
            </a>
        </div>

    </div>

    <a href="index.html" class="close-btn" aria-label="Close"></a>

</body>
</html>
