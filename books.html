    <style>
        body {
            background-color: #fffdf7;
            margin: 0;
            padding: 80px 40px 40px 80px;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        .page-wrapper {
            max-width: 960px;
            position: relative;
        }

        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            width: 60px;
            height: 60px;
        }

        .close-btn::before,
        .close-btn::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: black;
            transform-origin: center;
            position: absolute;
            top: 50%;
        }
        .close-btn::before { transform: rotate(45deg); }
        .close-btn::after  { transform: rotate(-45deg); }

        .year-section {
            margin-bottom: 40px;
        }

        .year-label {
            font-size: 15px;
            margin: 0 0 16px 0;
            font-weight: normal;
            color: #111;
        }

        .book-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .book {
            width: 80px;
            height: 115px;
            overflow: hidden;
            flex-shrink: 0;
            display: block;
            transition: opacity 0.2s;
        }

        .book:hover {
            opacity: 0.75;
        }

        .book img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 0 !important;
        }

        @media (max-width: 768px) {
            body {
                padding: 60px 16px 40px 16px;
            }

            .close-btn {
                width: 40px;
                height: 40px;
                top: 16px;
                right: 16px;
            }

            .close-btn::before,
            .close-btn::after {
                width: 40px;
            }

            .book {
                width: 65px;
                height: 95px;
            }

            .book-grid {
                gap: 10px;
            }
        }
    </style>
</head>
